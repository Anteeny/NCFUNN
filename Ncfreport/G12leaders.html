  // Leader name normalization
  const LEADER_DICTIONARY = [
    { name: "Ukamaka Augustine", keywords: ["ukamaka", "ukay", "p.ukay", "pa ukay", "pst ukay", "pastor ukay", "ma ukay", "augusta", "augustine", "brother ukamaka", "sister ukamaka"] },

    { name: "Nkechi Ohazulike", keywords: ["nkechi", "ohazulike", "pa nkechi", "pst nkechi", "pastor nkechi", "pastor mkechi", "mkechi", "sister nkechi", "mama nkechi", "nkechikwu"] },
    { name: "Precious Ubani", keywords: ["precious", "ubani", "precious ubani", "pastor precious", "pa precious", "pst precious", "pastor precious ubani", "brother precious", "sister precious", "mama precious", "priceless"] },

    { name: "Faithfulness Onuh", keywords: ["faithfulness", "onuh", "faith", "faithful", "pa faithfulness", "pst faithfulness", "pastor faithfulness", "brother faithfulness", "mr onuh"] },
    { name: "Vivian Nwolisa", keywords: ["vivian", "nwolisa", "vivian nwolisa", "pa vivian", "pst vivian", "pastor vivian", "sister vivian", "mama vivian", "viv", "vivienne"] },

    { name: "Udochukwu Aneke", keywords: ["udochukwu", "aneke", "pa udochukwu", "pst udochukwu", "pastor udochukwu", "brother udochukwu", "udu", "mr aneke", "mr udochukwu", "udo"] },
    { name: "Janefrancis Igwilo", keywords: ["janefrancis", "igwilo", "jane francis", "jane-francis", "pa janefrancis", "pst janefrancis", "pastor janefrancis", "sister janefrancis", "mama janefrancis", "jane"] },
    { name: "Favour Nsoke", keywords: ["nsoke", "favour", "nsoke favour", "pa nsoke", "pst nsoke", "pastor nsoke", "brother nsoke", "mr favour", "mr nsoke"] },
    { name: "Kosi Onyibor", keywords: ["kosi onyibor", "onyibor", "pa kosi onyibor", "pst kosi onyibor", "pastor kosi onyibor", "brother kosi onyibor", "mr onyibor"] },
    { name: "Ifeyinwa Umeadi", keywords: ["ifeyinwa", "umeadi", "ifeyinwa umeadi", "pa ifeyinwa", "pst ifeyinwa", "pastor ifeyinwa", "sister ifeyinwa", "mama ifeyinwa", "ify"] },
    { name: "Lovina Wilfred", keywords: ["lovina", "wilfred", "lovina wilfred", "pa lovina", "pst lovina", "pastor lovina", "sister lovina", "mama lovina", "mrs wilfred"] },
    { name: "Ebube Wilfred", keywords: ["wilfred", "ebube", "wilfred ebube", "pa wilfred", "pst wilfred", "pastor wilfred", "brother wilfred", "mr ebube", "mr wilfred", "willy"] },
    { name: "Chioma Meniru", keywords: ["chioma", "meniru", "chioma meniru", "pa chioma", "pst chioma", "pastor chioma", "sister chioma", "mama chioma", "chi", "mrs meniru"] },
    { name: "Joshua Ohanugo", keywords: ["joshua", "ohanugo", "joshua ohanugo", "pa joshua", "pst joshua", "pastor joshua", "brother joshua", "mr joshua", "mr ohanugo", "josh"] }
  ];

  function normalizeLeaderName(name) {
    if (!name || name.trim() === "") return "Unassigned";
    const normalized = name.trim().toLowerCase();
    
    for (let entry of LEADER_DICTIONARY) {
      if (entry.name.toLowerCase() === normalized) return entry.name;
    }
    
    for (let entry of LEADER_DICTIONARY) {
      if (entry.keywords.some(kw => kw.toLowerCase() === normalized)) return entry.name;
    }
    
    for (let entry of LEADER_DICTIONARY) {
      for (let kw of entry.keywords) {
        if (normalized.includes(kw.toLowerCase()) || kw.toLowerCase().includes(normalized)) {
          return entry.name;
        }
      }
    }
    
    let clean = name.trim();
    const titles = ["pastor", "pa", "pst", "mr", "mrs", "ms", "miss", "dr", "prof", "brother", "sister", "mama", "sis", "fr"];
    for (let title of titles) {
      const regex = new RegExp(`^${title}\\s+`, "i");
      clean = clean.replace(regex, "");
    }
    
    return clean.trim();
  }

<head>
  <meta charset="UTF-8"/>

  <style>

      --gold-light: #E8C97A;
      --deep: #1A1A2E;
      --ink: #16213E;
      --card: #0F3460;

      --accent: #E94560;
      --soft: #A8B2D8;
      --danger: #E05A5A;
      --success: #4CAF7C;

    body {

      min-height: 100vh;
      color: var(--text);

      align-items: center;
      justify-content: flex-start;

    h1, h2, h3 { font-family: 'Playfair Display', serif; }

    /* --- UNIFIED HEADER --- */
    header {
      width: 100%;
      padding: 1.4rem 2rem;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 1.1rem;
      border-bottom: 2px solid rgba(201, 168, 76, 0.35);

      margin-bottom: 4vh;
    }

      background: #FFFFFF; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; border: 2.5px solid var(--gold); overflow: hidden;
      animation: pulse-ring 3s ease-in-out infinite;
    }
    @keyframes pulse-ring {

      50%       { box-shadow: 0 0 0 8px rgba(201,168,76,0); }

    .logo-wrap img { width: 50px; height: 50px; object-fit: contain; }
    .header-text { text-align: left; }

      font-size: clamp(1.1rem, 3vw, 1.55rem);
      font-weight: 900; color: #FFFFFF; line-height: 1.15; margin: 0;

    .header-text p {
      font-size: 0.75rem; color: var(--gold-light, var(--gold));

    /* ── CONTAINER ── */
    .container { max-width: 1000px; margin: 0 auto; padding: 0 16px 60px; width: 100%; }

    /* ── GLASS CARD ── */
    .card {
      background: #101D42;
      border: 1px solid rgba(201,168,76,0.35);
      border-radius: 1.25rem;
      padding: 28px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);

    }

    .card-title { font-family:'Playfair Display',serif; font-size: 24px; margin-bottom: 22px; color: var(--gold-light); }

    /* ── TABS ── */
    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 2px solid rgba(201,168,76,0.25);
      margin-bottom: 28px;
    }
    .tab-btn {
      padding: 14px 24px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      letter-spacing: 0.05em;
    }
    .tab-btn:hover {
      color: var(--gold-light);
    }
    .tab-btn.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }

    /* ── CONTENT ── */
    .tab-content { display: none; }
    .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* ── LEADER LIST ── */
    .leader-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }
    .leader-card {
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(201,168,76,0.25);
      border-radius: 12px;
      padding: 24px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .leader-card:hover {
      border-color: var(--gold);
      background: rgba(201,168,76,0.08);
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(201,168,76,0.2);
    }
    .leader-name {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--gold-light);
      margin-bottom: 10px;
    }
    .leader-stat {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 13px;
      color: var(--muted);
    }
    .leader-stat strong {
      color: var(--text);
      font-weight: 600;
    }

    /* ── MEMBER LIST ── */
    .member-table {
      width: 100%;
      border-collapse: collapse;
    }
    .member-table th {
      padding: 14px;
      text-align: left;
      border-bottom: 2px solid rgba(201,168,76,0.25);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--gold);
      font-weight: 600;
    }
    .member-table td {
      padding: 14px;
      border-bottom: 1px solid rgba(201,168,76,0.1);
      font-size: 14px;
    }
    .member-table tr:hover {
      background: rgba(201,168,76,0.05);
    }
    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      background: rgba(201,168,76,0.15);
      color: var(--gold);
      border: 1px solid rgba(201,168,76,0.3);
    }
    .badge.g12 { background: rgba(91,143,212,0.15); color: #5B8FD4; border-color: rgba(91,143,212,0.3); }

    /* ── FORMS ── */
    label.field-label {
      display:block; font-size:0.72rem; letter-spacing:0.12em; text-transform:uppercase;
      color:var(--gold-light); margin-bottom:8px; font-weight:600;
    }
    select, input[type="date"], input[type="text"], textarea {
      width:100%; background:rgba(255,255,255,0.06); border:1px solid rgba(201,168,76,0.25);
      border-radius:0.625rem; color:var(--text); font-family:'DM Sans',sans-serif;
      font-size:15px; padding:13px 16px; outline:none; transition:border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    select { appearance:none; }
    select:focus, input:focus, textarea:focus {
      border-color:var(--gold); box-shadow:0 0 0 3px rgba(201,168,76,0.15);
      background:rgba(255,255,255,0.09);
    }
    select option { background: #1A2744; }
    input::placeholder { color:rgba(168,178,216,0.45); }

    /* ── BUTTONS ── */
    .btn-row { display:flex; gap:10px; margin-top:24px; justify-content:flex-end; }
    .btn { padding:12px 24px; border-radius:10px; border:none; font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; cursor:pointer; transition:all 0.2s; letter-spacing:0.04em; }
    .btn-ghost {
      background:transparent; border:1.5px solid rgba(168,178,216,0.25); color:var(--muted);
    }
    .btn-ghost:hover { border-color:rgba(168,178,216,0.5); color:var(--text); }
    .btn-primary {
      background:linear-gradient(135deg, #C9A84C 0%, #E8C97A 50%, #C9A84C 100%);
      background-size:200% 100%; color:#1A1A2E;
      box-shadow:0 4px 20px rgba(201,168,76,0.3);
    }
    .btn-primary:hover { background-position:100% 0; transform:translateY(-1px); box-shadow:0 6px 28px rgba(201,168,76,0.45); }
    .btn-secondary {
      background:transparent; border:1.5px solid var(--gold); color:var(--gold);
    }
    .btn-secondary:hover { background:rgba(201,168,76,0.1); }

    /* ── MODAL ── */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: #101D42;
      border: 1px solid rgba(201,168,76,0.35);
      border-radius: 1.25rem;
      padding: 40px;
      max-width: 500px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-header {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      color: var(--gold-light);
      margin-bottom: 20px;
    }
    .close-modal {
      float: right;
      font-size: 28px;
      font-weight: bold;
      color: var(--gold);
      cursor: pointer;
      line-height: 1;
    }
    .close-modal:hover { color: var(--gold-light); }

    /* ── FORM FIELDS ── */
    .form-group {
      margin-bottom: 20px;
    }
    .success-msg, .error-msg {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
    }
    .success-msg { background: rgba(76, 175, 124, 0.15); color: var(--success); border: 1px solid var(--success); }
    .error-msg { background: rgba(224, 90, 90, 0.15); color: var(--danger); border: 1px solid var(--danger); }

    .loading {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }
    .loading::after {
      content: "...";
      animation: dots 1.5s steps(4, end) infinite;
    }
    @keyframes dots {
      0%, 20% { content: ""; }
      40% { content: "."; }
      60% { content: ".."; }
      80%, 100% { content: "..."; }
    }

    @media (max-width: 768px) {
      .container { max-width: 100%; }
      .leader-grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); }
      .member-table { font-size: 12px; }
      .member-table th, .member-table td { padding: 10px; }
    }
  </style>
</head>

<body>
  <!-- HEADER -->
  <header>
    <div class="logo-wrap">
      <img src="images.png" alt="Logo">
    </div>
    <div class="header-text">
      <h1>G12 Leaders</h1>
      <p>Leader & Member Management</p>
    </div>
    <div class="header-date" id="headerDate"></div>
  </header>

  <!-- MAIN CONTAINER -->
  <div class="container">
    <div class="card">
      <!-- TABS -->
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('leaders', this)">📋 Leaders Overview</button>
        <button class="tab-btn" onclick="switchTab('members', this)">👥 Members by Leader</button>
        <button class="tab-btn" onclick="switchTab('add-member', this)">➕ Add Member</button>
      </div>

      <!-- TAB 1: LEADERS OVERVIEW -->
      <div id="leaders" class="tab-content active">
        <h2 class="card-title">G12 Leaders Overview</h2>
        <div class="loading" id="leadersLoading"></div>
        
        <div style="margin-bottom: 30px;">
          <h3 style="font-family: 'Playfair Display', serif; color: var(--gold-light); margin-bottom: 16px; font-size: 18px;">G12 Leaders</h3>
          <div class="leader-grid" id="g12LeaderGrid"></div>
        </div>

        <div>
          <h3 style="font-family: 'Playfair Display', serif; color: var(--gold-light); margin-bottom: 16px; font-size: 18px;">DH Leaders</h3>
          <div class="leader-grid" id="dhLeaderGrid"></div>
        </div>
      </div>

      <!-- TAB 2: MEMBERS BY LEADER -->
      <div id="members" class="tab-content">
        <h2 class="card-title">Members by Leader</h2>
        
        <div class="form-group">
          <label class="field-label">Select Leader</label>
          <select id="leaderFilter" onchange="loadMembersByLeader()">
            <option value="">-- All Leaders --</option>
          </select>
        </div>

        <div class="loading" id="membersLoading"></div>
        <table class="member-table" id="memberTable" style="display: none;">
          <thead>
            <tr>
              <th>Member Name</th>
              <th>Leader</th>
              <th>Phone</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="memberBody"></tbody>
        </table>
        <div id="noMembers" style="text-align: center; padding: 40px; color: var(--muted); display: none;">
          No members found for the selected leader.
        </div>
      </div>

      <!-- TAB 3: ADD MEMBER -->
      <div id="add-member" class="tab-content">
        <h2 class="card-title">Add New Member to G12</h2>
        <form onsubmit="addMember(event)" id="addMemberForm">
          <div id="formMessage"></div>
          
          <div class="form-group">
            <label class="field-label">Member Name *</label>
            <input type="text" id="memberName" placeholder="Enter member name" required>
          </div>

          <div class="form-group">
            <label class="field-label">Assigned Leader *</label>
            <select id="assignedLeader" required>
              <option value="">-- Select a Leader --</option>
            </select>
          </div>

          <div class="form-group">
            <label class="field-label">Phone Number</label>
            <input type="text" id="memberPhone" placeholder="Enter phone number">
          </div>

          <div class="form-group">
            <label class="field-label">Email</label>
            <input type="text" id="memberEmail" placeholder="Enter email address">
          </div>

          <div class="form-group">
            <label class="field-label">Notes</label>
            <textarea id="memberNotes" placeholder="Add any notes about this member" style="resize: vertical; min-height: 100px;"></textarea>
          </div>

          <div class="btn-row">
            <button type="button" class="btn btn-ghost" onclick="resetForm()">Clear</button>
            <button type="submit" class="btn btn-primary">Add Member</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- EDIT MEMBER MODAL -->
  <div class="modal" id="editModal">
    <div class="modal-content">
      <span class="close-modal" onclick="closeEditModal()">&times;</span>
      <div class="modal-header">Edit Member</div>
      <form onsubmit="saveMemberEdit(event)" id="editMemberForm">
        <div id="editFormMessage"></div>
        
        <div class="form-group">
          <label class="field-label">Member Name</label>
          <input type="text" id="editMemberName" required>
        </div>

        <div class="form-group">
          <label class="field-label">Assigned Leader</label>
          <select id="editAssignedLeader" required></select>
        </div>

        <div class="form-group">
          <label class="field-label">Phone Number</label>
          <input type="text" id="editMemberPhone">
        </div>

        <div class="form-group">
          <label class="field-label">Email</label>
          <input type="text" id="editMemberEmail">
        </div>

        <div class="form-group">
          <label class="field-label">Notes</label>
          <textarea id="editMemberNotes" style="resize: vertical; min-height: 100px;"></textarea>
        </div>

        <div class="btn-row">
          <button type="button" class="btn btn-ghost" onclick="closeEditModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let allLeaders = [];
    let allMembers = [];
    let currentEditMemberId = null;

    // Initialize
    document.addEventListener('DOMContentLoaded', async () => {
      updateDate();
      await loadMembers();
      await loadLeaders();
      populateLeaderDropdowns();
    });

    function updateDate() {
      const now = new Date();
      const options = { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' };
      document.getElementById('headerDate').textContent = now.toLocaleDateString('en-US', options);
    }

    async function loadLeaders() {
      try {
        // Build leader statistics from allMembers
        const g12Stats = {};
        const dhStats = {};

        allMembers.forEach(member => {
          if (member.leader_type === 'G12') {
            const leader = normalizeLeaderName(member.g12_leader);
            if (!g12Stats[leader]) {
              g12Stats[leader] = { count: 0, name: leader };
            }
            g12Stats[leader].count++;
          } else if (member.leader_type === 'DH') {
            const leader = normalizeLeaderName(member.g12_leader);
            if (!dhStats[leader]) {
              dhStats[leader] = { count: 0, name: leader };
            }
            dhStats[leader].count++;
          }
        });

        // Only show leaders that actually have members
        const g12Leaders = Object.values(g12Stats).sort((a, b) => a.name.localeCompare(b.name));
        const dhLeaders = Object.values(dhStats).sort((a, b) => a.name.localeCompare(b.name));

        displayLeaders(g12Leaders, dhLeaders);
      } catch (error) {
        console.error('Error loading leaders:', error);
      }
    }

    async function loadMembers() {
      try {
        const { data, error } = await supabaseClient
          .from('members')
          .select('*');

        if (error) throw error;

        allMembers = data || [];
      } catch (error) {
        console.error('Error loading members:', error);
      }
    }

    function displayLeaders(g12Leaders, dhLeaders) {
      const g12Grid = document.getElementById('g12LeaderGrid');
      const dhGrid = document.getElementById('dhLeaderGrid');
      const loading = document.getElementById('leadersLoading');
      
      loading.style.display = 'none';
      g12Grid.innerHTML = '';
      dhGrid.innerHTML = '';

      // Display G12 Leaders
      if (g12Leaders.length === 0) {
        g12Grid.innerHTML = '<div style="color: var(--muted); padding: 20px; text-align: center; grid-column: 1/-1;">No G12 leaders with members yet.</div>';
      } else {
        g12Leaders.forEach(leader => {
          const card = document.createElement('div');
          card.className = 'leader-card';
          card.innerHTML = `
            <div class="leader-name">${leader.name}</div>
            <div class="leader-stat">
              <span>Members</span>
              <strong>${leader.count}</strong>
            </div>
            <button class="btn btn-secondary" style="width: 100%; margin-top: 12px;" onclick="viewLeaderMembers('${leader.name}', 'g12')">
              View Members →
            </button>
          `;
          g12Grid.appendChild(card);
        });
      }

      // Display DH Leaders
      if (dhLeaders.length === 0) {
        dhGrid.innerHTML = '<div style="color: var(--muted); padding: 20px; text-align: center; grid-column: 1/-1;">No DH leaders with members yet.</div>';
      } else {
        dhLeaders.forEach(leader => {
          const card = document.createElement('div');
          card.className = 'leader-card';
          card.innerHTML = `
            <div class="leader-name">${leader.name}</div>
            <div class="leader-stat">
              <span>Members</span>
              <strong>${leader.count}</strong>
            </div>
            <button class="btn btn-secondary" style="width: 100%; margin-top: 12px;" onclick="viewLeaderMembers('${leader.name}', 'dh')">
              View Members →
            </button>
          `;
          dhGrid.appendChild(card);
        });
      }
    }

    function populateLeaderDropdowns() {
      // Only add leaders that actually have G12 members
      const g12Stats = {};
      allMembers.forEach(member => {
        if (member.leader_type === true || member.leader_type === 'true') {
          const leader = normalizeLeaderName(member.g12_leader);
          if (!g12Stats[leader]) {
            g12Stats[leader] = true;
          }
        }
      });

      const g12Leaders = Object.keys(g12Stats).sort();
      const options = g12Leaders.map(l => `<option value="${l}">${l}</option>`).join('');
      
      document.getElementById('assignedLeader').innerHTML = '<option value="">-- Select a Leader --</option>' + options;
      document.getElementById('leaderFilter').innerHTML = '<option value="">-- All Leaders --</option>' + options;
      document.getElementById('editAssignedLeader').innerHTML = '<option value="">-- Select a Leader --</option>' + options;
    }

    function viewLeaderMembers(leaderName, type) {
      document.getElementById('leaderFilter').value = leaderName;
      const membersBtn = document.querySelectorAll('.tab-btn')[1];
      switchTab('members', membersBtn);
      loadMembersByLeader(type);
    }

    async function loadMembersByLeader(type) {
      const selectedLeader = document.getElementById('leaderFilter').value;
      const loading = document.getElementById('membersLoading');
      const table = document.getElementById('memberTable');
      const noMembers = document.getElementById('noMembers');
      const tbody = document.getElementById('memberBody');

      loading.style.display = 'block';
      table.style.display = 'none';
      noMembers.style.display = 'none';
      tbody.innerHTML = '';

      try {
        // Filter by G12 type
        let filteredMembers = allMembers.filter(m => m.leader_type === 'G12');

        if (selectedLeader) {
          filteredMembers = filteredMembers.filter(m => normalizeLeaderName(m.g12_leader) === selectedLeader);
        }

        loading.style.display = 'none';

        if (!filteredMembers || filteredMembers.length === 0) {
          noMembers.style.display = 'block';
        } else {
          table.style.display = 'table';
          filteredMembers.forEach(member => {
            const row = tbody.insertRow();
            const normalizedLeader = normalizeLeaderName(member.g12_leader);
            row.innerHTML = `
              <td>${member.member_name || 'N/A'}</td>
              <td>${normalizedLeader || 'Unassigned'}</td>
              <td>${member.phone || 'N/A'}</td>
              <td>
                <button class="btn btn-secondary" style="padding: 6px 12px; font-size: 12px;" onclick="openEditModal('${member.id}')">Edit</button>
              </td>
            `;
          });
        }
      } catch (error) {
        console.error('Error loading members:', error);
        loading.style.display = 'none';
      }
    }

    function switchTab(tabName, button) {
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      
      document.getElementById(tabName).classList.add('active');
      if (button) {
        button.classList.add('active');
      }
    }

    async function addMember(event) {
      event.preventDefault();
      const formMessage = document.getElementById('formMessage');

      const memberName = document.getElementById('memberName').value.trim();
      const leader = normalizeLeaderName(document.getElementById('assignedLeader').value);
      const phone = document.getElementById('memberPhone').value.trim();
      const email = document.getElementById('memberEmail').value.trim();
      const notes = document.getElementById('memberNotes').value.trim();

      if (!memberName || !leader) {
        showMessage(formMessage, 'Please fill in all required fields', 'error');
        return;
      }

      try {
        const { data, error } = await supabaseClient
          .from('members')
          .insert([{
            member_name: memberName,
            g12_leader: leader,
            phone: phone || null,
            email: email || null,
            notes: notes || null,
            leader_type: 'G12',
            created_at: new Date().toISOString()
          }])
          .select();

        if (error) throw error;

        showMessage(formMessage, `✓ Member "${memberName}" added successfully!`, 'success');
        document.getElementById('addMemberForm').reset();
        await loadMembers();
        await loadLeaders();
        populateLeaderDropdowns();

        setTimeout(() => {
          const membersBtn = document.querySelectorAll('.tab-btn')[1];
          switchTab('members', membersBtn);
          loadMembersByLeader();
        }, 1500);
      } catch (error) {
        console.error('Error adding member:', error);
        showMessage(formMessage, 'Error adding member. Please try again.', 'error');
      }
    }

    async function openEditModal(memberId) {
      const member = allMembers.find(m => m.id === memberId);
      if (!member) return;

      currentEditMemberId = memberId;
      document.getElementById('editMemberName').value = member.member_name || '';
      document.getElementById('editAssignedLeader').value = member.g12_leader || '';
      document.getElementById('editMemberPhone').value = member.phone || '';
      document.getElementById('editMemberEmail').value = member.email || '';
      document.getElementById('editMemberNotes').value = member.notes || '';
      document.getElementById('editFormMessage').innerHTML = '';
      
      document.getElementById('editModal').classList.add('active');
    }

    function closeEditModal() {
      document.getElementById('editModal').classList.remove('active');
      currentEditMemberId = null;
    }

    async function saveMemberEdit(event) {
      event.preventDefault();
      const editMessage = document.getElementById('editFormMessage');

      const memberName = document.getElementById('editMemberName').value.trim();
      const leader = normalizeLeaderName(document.getElementById('editAssignedLeader').value);
      const phone = document.getElementById('editMemberPhone').value.trim();
      const email = document.getElementById('editMemberEmail').value.trim();
      const notes = document.getElementById('editMemberNotes').value.trim();

      if (!memberName || !leader) {
        showMessage(editMessage, 'Please fill in all required fields', 'error');
        return;
      }

      try {
        const { error } = await supabaseClient
          .from('members')
          .update({
            member_name: memberName,
            g12_leader: leader,
            phone: phone || null,
            email: email || null,
            notes: notes || null
          })
          .eq('id', currentEditMemberId);

        if (error) throw error;

        showMessage(editMessage, `✓ Member updated successfully!`, 'success');
        
        setTimeout(() => {
          closeEditModal();
          loadMembers();
          loadMembersByLeader();
        }, 1000);
      } catch (error) {
        console.error('Error updating member:', error);
        showMessage(editMessage, 'Error updating member. Please try again.', 'error');
      }
    }

    function resetForm() {
      document.getElementById('addMemberForm').reset();
      document.getElementById('formMessage').innerHTML = '';
    }

    function showMessage(element, message, type) {
      element.innerHTML = `<div class="${type}-msg">${message}</div>`;
      setTimeout(() => {
        if (type === 'success') {
          element.innerHTML = '';
        }
      }, 4000);
    }

    window.onclick = function(event) {
      const modal = document.getElementById('editModal');
      if (event.target == modal) {
        closeEditModal();
      }
    }
  </script>
</body>
</html>
