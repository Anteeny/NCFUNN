      { name: "Joshua ohanugo", keywords: ["joshua", "ohanugo", "joshua ohanugo", "pa joshua", "pst joshua", "pastor joshua", "brother joshua", "mr joshua", "mr ohanugo", "josh"] }

    /**
     * Normalize leader name by converting aliases to canonical names
     */
    function normalizeLeaderName(name) {
      if (!name || name.trim() === "") return "Unassigned";
      
      const normalized = name.trim().toLowerCase();
      
      // Try exact match first
      for (let entry of LEADER_DICTIONARY) {
        if (entry.name.toLowerCase() === normalized) return entry.name;
      }
      
      // Try keyword matching
      for (let entry of LEADER_DICTIONARY) {
        if (entry.keywords.some(kw => kw.toLowerCase() === normalized)) return entry.name;
      }
      
      // Try partial keyword matching
      for (let entry of LEADER_DICTIONARY) {
        for (let kw of entry.keywords) {
          if (normalized.includes(kw.toLowerCase()) || kw.toLowerCase().includes(normalized)) {
            return entry.name;
          }
        }
      }
      
      // Remove common titles and return
      let clean = name.trim();
      const titles = ["pastor", "pa", "pst", "mr", "mrs", "ms", "miss", "dr", "prof", "brother", "sister", "mama", "sis", "fr"];
      for (let title of titles) {
        const regex = new RegExp(`^${title}\\s+`, "i");
        clean = clean.replace(regex, "");
      }
      
      return clean.trim();
    }

    async function fetchAllLeaders() {
      const { data, error } = await supabaseClient
          .from('members')
          .select('g12_leader')
          .in('leader_type', ['DH', 'G12']);

      if (error) { console.error("Error fetching leaders:", error); return; }
      if (data) {
          window.allLeaders = [...new Set(data.map(item => item.g12_leader).filter(Boolean).sort())];
      }
    }

    function promptSmartModal(title, label, useLeaderSuggestions = false, defaultValue = '') {
      return new Promise((resolve) => {
        const modal = document.getElementById('smartModal');
        document.getElementById('smartModalTitle').textContent = title;
        document.getElementById('smartModalLabel').textContent = label;
        const input = document.getElementById('smartModalInput');
        const sugBox = document.getElementById('smartSuggestions');
        
        input.value = defaultValue;
        sugBox.style.display = 'none';
        modal.style.display = 'flex';
        input.focus();

        const submitBtn = document.getElementById('smartModalSubmit');
        const cancelBtn = document.getElementById('smartModalCancel');

        const cleanup = () => { submitBtn.onclick = null; cancelBtn.onclick = null; input.oninput = null; modal.style.display = 'none'; };
        submitBtn.onclick = () => { const val = input.value.trim(); if (val) { cleanup(); resolve(val); } };
        cancelBtn.onclick = () => { cleanup(); resolve(null); };

        input.oninput = (e) => {
          const val = e.target.value.toLowerCase().trim();
          sugBox.innerHTML = '';
          if (!val) { sugBox.style.display = 'none'; return; }

          let matches = new Set();
          LEADER_DICTIONARY.forEach(item => { if (item.name.toLowerCase().includes(val) || item.keywords.some(k => k.toLowerCase().includes(val))) matches.add(item.name); });
          window.allLeaders.forEach(leader => { if (leader.toLowerCase().includes(val)) matches.add(leader); });

          if (matches.size > 0) {
            sugBox.style.display = 'block';
            matches.forEach(match => {
              const div = document.createElement('div');
              div.className = 'smart-suggestion-item'; div.textContent = match;
              div.onclick = () => { input.value = match; sugBox.style.display = 'none'; };
              sugBox.appendChild(div);
            });
          } else { sugBox.style.display = 'none'; }
        };
      });
    }

    async function selectG12Leader() {

    async function submitRegistration() {
      // Gather input values
      const member_name = document.getElementById('member_name').value.trim();
      const member_phone = document.getElementById('member_phone').value.trim();
      const course_of_study = document.getElementById('course_of_study').value.trim();
      const level = document.getElementById('level').value;
      const school_address = document.getElementById('school_address').value.trim();
      const home_address = document.getElementById('home_address').value.trim();
      const department = document.getElementById('department').value;
      let g12_leader = document.getElementById('g12_leader').value.trim();
      const g12_phone = document.getElementById('g12_phone').value.trim();

      // NORMALIZE G12 LEADER NAME - Convert aliases to canonical names
      g12_leader = normalizeLeaderName(g12_leader);

      // Basic validation
      if (!member_name || !member_phone) {
        alert("Please provide at least your Full Name and Phone Number.");
        return;
      }

      const btn = document.getElementById('submit-btn');
      btn.textContent = "Submitting...";
      btn.disabled = true;

      // 1. Check if member already exists (case-insensitive search by name)
      const { data: existingData, error: searchError } = await supabaseClient
        .from('members')
        .select('*')
        .ilike('member_name', member_name);

      if (searchError) {
        console.error("Search Error:", searchError.message);
        alert("Error checking database: " + searchError.message);
        btn.textContent = "Submit Details";
        btn.disabled = false;
        return;
      }

      let dbError = null;

      if (existingData && existingData.length > 0) {
        // 2. Member exists! Update their record instead of creating a new one.
        const existingMember = existingData[0];
        const updatePayload = {};
        
        // Only update fields that the user actually filled in on the form
        if (member_phone) updatePayload.member_phone = member_phone;
        if (course_of_study) updatePayload.course_of_study = course_of_study;
        if (level) updatePayload.level = level;
        if (school_address) updatePayload.School_Address = school_address;
        if (home_address) updatePayload.Home_Address = home_address;
        if (department) updatePayload.department = department;
        if (g12_leader) updatePayload.g12_leader = g12_leader;
        if (g12_phone) updatePayload.g12_phone = g12_phone;

        // We don't touch leader_type, preserving 'DH' or 'G12' if they are already a leader
        const { error } = await supabaseClient.from('members').update(updatePayload).eq('id', existingMember.id);
        dbError = error;
      } else {
        // 3. New Member! Insert them into the database.
        const insertPayload = {
          member_name: member_name, member_phone: member_phone, course_of_study: course_of_study || null,
          level: level || null, School_Address: school_address || null, Home_Address: home_address || null,
          department: department || null, g12_leader: g12_leader || null, g12_phone: g12_phone || null, leader_type: 'DH'
        };
        const { error } = await supabaseClient.from('members').insert([insertPayload]);
        dbError = error;
      }

      if (dbError) {
        console.error("Database Error:", dbError.message);
        alert("Something went wrong. Please try again. Error: " + dbError.message);
        btn.textContent = "Submit Details";
        btn.disabled = false;
      } else {
        // Hide form and show success
        document.getElementById('registration-form').style.display = 'none';
        document.getElementById('success-message').style.display = 'block';
      }
    }

    // Fetch leaders when the page loads


    document.addEventListener('DOMContentLoaded', fetchAllLeaders);
  </script>
</body>
</html>
